[tool.poetry]
name = "blaise-point-in-time-restore"
version = "0.1.0"
description = ""
authors = ["Blaise Team"]
readme = "README.md"
package-mode = false

[tool.poetry.dependencies]
python = "^3.13"
sqlalchemy = "^2.0.43"
pymysql = "^1.1.2"
cloud-sql-python-connector = "^1.18.4"
functions-framework = "3.9.2"
requests = "^2.32.5"
google-auth = "^2.40.3"
python-dotenv = "^1.1.1"
google-api-python-client = "^2.183.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.4.2"
mypy = "^1.6.1"
mock = "^5.1.0"
isort = "^5.8.0"
flake8 = "^7.3.0"
flake8-cognitive-complexity = "^0.1.0"
black = "^25.1.0"
mock-alchemy = "^0.2.6"

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
